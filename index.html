<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <meta
      name="description"
      content="A quiet personal todo app for an OGCIO workday, built using the Government of Ireland Design System."
    />
    <title>UX ToDo</title>
    <!--
      Gov.ie's Icon component renders most icons via a <span class="material-symbols-outlined">
      font ligature, but the design system doesn't ship the font itself. Loading it from
      Google's CDN makes the existing gov.ie Icon API work as intended (apps, add_circle,
      format_list_bulleted, etc.). preconnect + display=block prevents a flash of text
      ligatures before the font is ready.
    -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,400,0..1,0&display=block"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
