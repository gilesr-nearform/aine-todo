# Build the Vite app and publish it to GitHub Pages on every push to main.
# This was added as a deliberate override of the Day-0 "no deployment" decision
# in docs/brief.md §9, scoped to making the prototype reviewable via a single
# link rather than a clone-and-run handoff. See the matching decision-log entry.
#
# Publishes to: https://<owner>.github.io/<repo-name>/  (so the Vite build runs
# with --base=/<repo-name>/ to make asset URLs resolve under the sub-path).

name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # The repo name is the URL sub-path on github.io, so the build needs
      # `--base=/${{ github.event.repository.name }}/`. Using the repo name
      # dynamically keeps the workflow portable if the repo is ever renamed.
      - run: pnpm exec vite build --base=/${{ github.event.repository.name }}/

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
